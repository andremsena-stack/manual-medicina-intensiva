<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d2438" />
    <meta
      name="description"
      content="Manual de Medicina Intensiva: capítulos clínicos, calculadoras de dose e vazão com bloqueio mútuo, modo offline e atualizações rastreadas. Apoio à decisão no plantão de UTI."
    />
    <meta name="author" content="Virtus · Clinical Tools" />

    <!-- PWA — instalação iOS Safari (não usa manifest webmanifest da mesma forma
         que Android/desktop, exige meta tags próprias).
         O usuário instala via Compartilhar → "Adicionar à Tela de Início". -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Virtus Intensiva" />
    <meta name="application-name" content="Virtus Intensiva" />
    <link rel="apple-touch-icon" href="/pwa-icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-icons/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icon.svg" color="#0d2438" />

    <!-- Tela de splash do PWA iOS — evita flash branco durante o launch.
         Sem apple-touch-startup-image, iOS exibe fundo branco até o app
         pintar o primeiro frame. Aqui usamos o próprio apple-touch-icon
         como fallback universal; iOS escala/centraliza sobre fundo navy
         definido em body / theme-color. -->
    <link rel="apple-touch-startup-image" href="/pwa-icons/icon-512.png" />

    <!-- Pré-pinta o fundo da página com a cor brand-deep para evitar flash
         branco entre o launch screen iOS e o primeiro paint do React.
         O bundle principal ainda carrega via <script type="module"> abaixo. -->
    <style>
      html, body { background: #0d2438; }
    </style>

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Manual de Medicina Intensiva" />
    <meta property="og:title" content="Manual de Medicina Intensiva — Virtus Clinical Tools" />
    <meta
      property="og:description"
      content="Capítulos clínicos, calculadoras com bloqueio mútuo dose↔vazão e modo offline. Apoio à decisão no plantão de UTI."
    />
    <meta property="og:url" content="https://manualvirtus.com.br" />
    <meta property="og:image" content="https://manualvirtus.com.br/virtus-logo/virtus_logo_horizontal_transparente.png" />
    <meta property="og:image:alt" content="Virtus Clinical Tools — Manual de Medicina Intensiva" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Manual de Medicina Intensiva — Virtus Clinical Tools" />
    <meta
      name="twitter:description"
      content="Capítulos clínicos, calculadoras com bloqueio mútuo dose↔vazão e modo offline. Apoio à decisão no plantão de UTI."
    />
    <meta name="twitter:image" content="https://manualvirtus.com.br/virtus-logo/virtus_logo_horizontal_transparente.png" />

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="canonical" href="https://manualvirtus.com.br/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    />
    <title>Manual de Medicina Intensiva — Virtus Clinical Tools</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
