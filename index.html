<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d2438" />
    <meta
      name="description"
      content="Manual de Medicina Intensiva: capítulos clínicos, calculadoras de dose e vazão com bloqueio mútuo, modo offline e atualizações rastreadas. Apoio à decisão no plantão de UTI."
    />
    <meta name="author" content="Virtus · Clinical Tools" />

    <!-- PWA — instalação iOS Safari (não usa manifest webmanifest da mesma forma
         que Android/desktop, exige meta tags próprias).
         O usuário instala via Compartilhar → "Adicionar à Tela de Início". -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Virtus Intensiva" />
    <meta name="application-name" content="Virtus Intensiva" />
    <link rel="apple-touch-icon" href="/pwa-icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-icons/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icon.svg" color="#0d2438" />

    <!-- Tela de splash do PWA iOS — evita flash branco durante o launch.
         Sem apple-touch-startup-image, iOS exibe fundo branco até o app
         pintar o primeiro frame. Aqui usamos o próprio apple-touch-icon
         como fallback universal; iOS escala/centraliza sobre fundo navy
         definido em body / theme-color. -->
    <link rel="apple-touch-startup-image" href="/pwa-icons/icon-512.png" />

    <!-- Pré-pinta o fundo da página com a cor brand-deep para evitar flash
         branco entre o launch screen iOS e o primeiro paint do React.
         O bundle principal ainda carrega via <script type="module"> abaixo. -->
    <style>
      html, body { background: #0d2438; }
      .pre-react-fallback {
        position: fixed; inset: 0; z-index: 1;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; padding: 40px 24px; text-align: center;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        color: #f1f6fb; background: #0d2438;
        transition: opacity 0.3s ease;
      }
      .pre-react-fallback.is-hidden { opacity: 0; pointer-events: none; }
      .pre-react-fallback__logo {
        width: 56px; height: 56px;
        background:
          linear-gradient(135deg, #30f1e6 0%, #12bed1 100%);
        border-radius: 14px;
        animation: preReactPulse 1.6s ease-in-out infinite;
      }
      @keyframes preReactPulse {
        0%, 100% { opacity: 0.85; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.06); }
      }
      .pre-react-fallback__title {
        font-size: 17px; font-weight: 700; letter-spacing: -0.01em;
        color: #ffffff; margin: 0;
      }
      .pre-react-fallback__sub {
        font-size: 13.5px; line-height: 1.5;
        color: rgba(241,246,251,0.78); max-width: 320px; margin: 0;
      }
      .pre-react-fallback__retry {
        background: linear-gradient(135deg, #30f1e6 0%, #12bed1 100%);
        color: #0d2438; border: 0; border-radius: 999px;
        padding: 10px 22px; font-size: 14px; font-weight: 700;
        cursor: pointer; box-shadow: 0 6px 16px rgba(18,190,209,0.32);
        display: none;
      }
      .pre-react-fallback.is-stuck .pre-react-fallback__retry { display: inline-block; }
      .pre-react-fallback.is-stuck .pre-react-fallback__logo { animation: none; opacity: 0.4; }
      .pre-react-fallback__small {
        font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
        color: rgba(48,241,230,0.8); margin: 0;
      }
      .pre-react-fallback__diag {
        margin: 14px 16px 0;
        padding: 10px 12px;
        background: rgba(180,35,24,0.10);
        border: 1px solid rgba(180,35,24,0.42);
        border-radius: 8px;
        max-width: 540px;
        max-height: 220px;
        overflow: auto;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        font-size: 11px;
        line-height: 1.45;
        text-align: left;
        color: #ffb38a;
        word-break: break-word;
        white-space: pre-wrap;
        display: none;
      }
      .pre-react-fallback.has-error .pre-react-fallback__diag { display: block; }
      .pre-react-fallback__diag strong { color: #ffd6c4; }
    </style>

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Manual de Medicina Intensiva" />
    <meta property="og:title" content="Manual de Medicina Intensiva — Virtus Clinical Tools" />
    <meta
      property="og:description"
      content="Capítulos clínicos, calculadoras com bloqueio mútuo dose↔vazão e modo offline. Apoio à decisão no plantão de UTI."
    />
    <meta property="og:url" content="https://manualvirtus.com.br" />
    <meta property="og:image" content="https://manualvirtus.com.br/virtus-logo/virtus_logo_horizontal_transparente.png" />
    <meta property="og:image:alt" content="Virtus Clinical Tools — Manual de Medicina Intensiva" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Manual de Medicina Intensiva — Virtus Clinical Tools" />
    <meta
      name="twitter:description"
      content="Capítulos clínicos, calculadoras com bloqueio mútuo dose↔vazão e modo offline. Apoio à decisão no plantão de UTI."
    />
    <meta name="twitter:image" content="https://manualvirtus.com.br/virtus-logo/virtus_logo_horizontal_transparente.png" />

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="canonical" href="https://manualvirtus.com.br/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    />
    <title>Manual de Medicina Intensiva — Virtus Clinical Tools</title>
  </head>
  <body>
    <div id="root">
      <!-- Fallback visível enquanto React monta. Se o bundle JS demorar > 4s
           para montar (offline, cache antigo, erro de runtime), exibe botão
           de recarregar + opção de purgar service worker. Removido automa-
           ticamente pelo React no primeiro render. -->
      <div class="pre-react-fallback" id="preReactFallback">
        <div class="pre-react-fallback__logo" aria-hidden="true"></div>
        <p class="pre-react-fallback__small">Virtus · Manual de Medicina Intensiva</p>
        <p class="pre-react-fallback__title" id="preReactTitle">Carregando…</p>
        <p class="pre-react-fallback__sub" id="preReactSub">Aguarde alguns segundos.</p>
        <button type="button" class="pre-react-fallback__retry" id="preReactRetry">
          Recarregar e limpar cache
        </button>
        <pre class="pre-react-fallback__diag" id="preReactDiag" aria-live="polite"></pre>
      </div>
    </div>
    <script>
      // Sentinela: se o React não tiver montado em 4 s, troca a mensagem
      // para "ficou preso" + mostra botão para forçar reload + unregister SW.
      // Também captura erros globais e os exibe na tela (debug à distância
      // em iOS PWA standalone, onde não há acesso ao console).
      (function () {
        var fb = document.getElementById('preReactFallback');
        if (!fb) return;
        var diag = document.getElementById('preReactDiag');
        var errors = [];
        function appendError(label, info) {
          errors.push('[' + label + '] ' + info);
          if (diag) {
            diag.textContent = errors.join('\n\n');
            fb.classList.add('has-error');
          }
        }
        window.addEventListener('error', function (ev) {
          var src = ev.filename ? ev.filename.split('/').pop() : '?';
          var msg = (ev.message || 'unknown error') + '  @ ' + src + ':' + (ev.lineno || 0);
          if (ev.error && ev.error.stack) msg += '\n' + ev.error.stack.split('\n').slice(0, 4).join('\n');
          appendError('JS error', msg);
        });
        window.addEventListener('unhandledrejection', function (ev) {
          var reason = ev.reason;
          var msg = reason && reason.message ? reason.message : String(reason);
          if (reason && reason.stack) msg += '\n' + reason.stack.split('\n').slice(0, 4).join('\n');
          appendError('Promise rejection', msg);
        });
        var stuckTimer = setTimeout(function () {
          fb.classList.add('is-stuck');
          var t = document.getElementById('preReactTitle');
          var s = document.getElementById('preReactSub');
          if (t) t.textContent = 'Não consegui carregar o app';
          if (s) s.textContent = errors.length
            ? 'Detectei erro de JS (detalhes abaixo). Toque para limpar cache e tentar de novo.'
            : 'Pode ser cache desatualizado ou bloqueio do navegador. Toque para limpar e tentar de novo.';
        }, 4000);
        // Observa o #root: quando o React criar conteúdo dentro, esconde o fallback.
        var root = document.getElementById('root');
        if (root && window.MutationObserver) {
          var mo = new MutationObserver(function () {
            // React monta como filho do #root. Se houver um filho que NÃO seja o fallback, ok.
            for (var i = 0; i < root.children.length; i++) {
              if (root.children[i] !== fb) {
                fb.classList.add('is-hidden');
                clearTimeout(stuckTimer);
                setTimeout(function () { if (fb.parentNode) fb.parentNode.removeChild(fb); }, 350);
                mo.disconnect();
                return;
              }
            }
          });
          mo.observe(root, { childList: true });
        }
        // Botão de retry: unregister SW + clear caches + reload.
        var retry = document.getElementById('preReactRetry');
        if (retry) {
          retry.addEventListener('click', async function () {
            retry.disabled = true;
            retry.textContent = 'Limpando…';
            try {
              if ('serviceWorker' in navigator) {
                var regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map(function (r) { return r.unregister(); }));
              }
              if (window.caches && caches.keys) {
                var keys = await caches.keys();
                await Promise.all(keys.map(function (k) { return caches.delete(k); }));
              }
            } catch (e) {
              // ignora — vai recarregar mesmo
            }
            // bust de cache do HTML também
            var url = new URL(window.location.href);
            url.searchParams.set('_t', String(Date.now()));
            window.location.replace(url.toString());
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
